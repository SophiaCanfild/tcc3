<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vida+ Área Médica</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Fraunces:wght@700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="area-medica.css">

</head>

<body>

<!-- LOGIN MÉDICO -->
<section id="page-login" class="medical-page">

    <div class="medical-glow"></div>

    <div class="medical-card">

        <!-- ÍCONE -->
        <div class="medical-icon">
            🩺
        </div>

        <!-- TÍTULO -->
        <h1 class="medical-title">
            Área Médica
        </h1>

        <p class="medical-subtitle">
            Cadastro e acesso restrito
        </p>


        <!-- OPÇÕES -->
        <div class="medical-options">

            <label class="medical-option active-option">

                <input
                    type="radio"
                    name="tipo-acesso"
                    checked
                >

                <span>
                    Acessar como médico
                </span>

            </label>

            <label class="medical-option" onclick="mostrarCadastroMedico()">
               <input type="radio" name="tipo-acesso">
               <span>Cadastro de novo médico</span>
            </label>

        </div>


        <!-- FORM -->
        <div class="medical-form">

            <!-- CRM -->
            <div>

                <label class="medical-label">
                    CRM
                </label>

                <input
                    type="text"
                    id="crm-medico"
                    required
                    placeholder="Digite seu CRM"
                    inputmode="numeric"
                    oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                    class="medical-input"
                >

            </div>
            <!-- CADASTRO MÉDICO -->
<div
    id="cadastro-medico-box"
    class="medical-form hidden mt-8"
>

    <div>
        <label class="medical-label">
            Nome completo
        </label>

        <input
            type="text"
            id="novo-medico"
            placeholder="Digite seu nome"
            class="medical-input"
        >
    </div>

    <div>
        <label class="medical-label">
            CRM
        </label>

        <input
            type="text"
            id="novo-crm"
            placeholder="CRM"
            inputmode="numeric"
            oninput="this.value = this.value.replace(/[^0-9]/g, '')"
            class="medical-input"
        >
    </div>

    <div>
        <label class="medical-label">
            Senha
        </label>

        <input
            type="password"
            id="nova-senha"
            placeholder="Crie uma senha"
            class="medical-input"
        >
    </div>

    <button
        onclick="cadastrarMedico()"
        class="medical-button"
    >
        ➕ Criar cadastro
    </button>

</div>

            <!-- SENHA -->
            <div>

                <label class="medical-label">
                    Senha
                </label>

                <input
                    type="password"
                    id="senha-medico"
                    required
                    placeholder="Sua senha"
                    class="medical-input"
                >

            </div>


            <!-- BOTÃO -->
            <button
                onclick="loginMedico()"
                class="medical-button"
            >
                🔒 Acessar
            </button>


            <!-- VOLTAR -->
            <button
                onclick="window.location.href='index.html'"
                class="medical-back"
            >
                ✕ Voltar
            </button>

        </div>

    </div>

</section>

<!-- ================================= -->
<!-- DASHBOARD -->
<!-- ================================= -->

<section id="page-dashboard" class="hidden dashboard-page">

    <!-- sidebar -->

    <aside class="sidebar">

        <div>

            <div class="logo-box">

                <div class="logo-icon">
                    +
                </div>

                <div>

                    <h1>
                        Vida+
                    </h1>

                    <p>
                        Painel Médico
                    </p>

                </div>

            </div>


            <div class="sidebar-info">

                <div class="info-card">

                    <span>
                        Pacientes
                    </span>

                    <strong id="total-pacientes">
                        0
                    </strong>

                </div>

                <div class="info-card red">

                    <span>
                        Emergências
                    </span>

                    <strong id="total-emergencias">
                        0
                    </strong>

                </div>

                <div class="info-card blue">

                    <span>
                        Em atendimento
                    </span>

                    <strong id="total-atendimento">
                        0
                    </strong>

                </div>

            </div>

        </div>


        <button
            class="logout-btn"
            onclick="logoutMedico()">

            Encerrar sessão

        </button>

    </aside>


    <!-- conteúdo -->

    <main class="main-content">

        <!-- top -->

        <header class="topbar">

            <div>

                <h2>
                    Central de Atendimento
                </h2>

                <p>
                    Monitoramento em tempo real
                </p>

            </div>

            <div class="clock-box" id="clock-box">

                00:00

            </div>

        </header>


        <!-- conteúdo principal -->

        <div class="dashboard-grid">

            <!-- lista -->

            <div class="patients-card">

                <div class="patients-header">

                    <div>

                        <h3>
                            Fila de Pacientes
                        </h3>

                        <p id="contador-lista">
                            0 pacientes
                        </p>

                    </div>

                </div>

                <ul id="lista-dashboard">

                </ul>

            </div>


            <!-- detalhes -->

            <div
                class="details-panel"
                id="detalhes-paciente">

                <div class="empty-state">

                    <div class="empty-icon">
                        🩺
                    </div>

                    <h3>
                        Nenhum paciente selecionado
                    </h3>

                    <p>
                        Clique em um paciente para visualizar o prontuário completo.
                    </p>

                </div>

            </div>

        </div>

    </main>

</section>

<script src="area-medica.js"></script>

</body>
</html>
